###################################################################
# CONFIGURAÇÃO KSMTUNED - (PROXMOX VE)
# Perfil: Slow and Deep (Alta Densidade com Proteção de CPU/IRQ)
###################################################################

# 1. GATILHO DE ATIVAÇÃO (O Limite de Segurança)
# Ativa o KSM quando a memória livre do host cair abaixo de 40%
# (Ou seja, o nó precisa estar consumindo > 60% da RAM física)
KSM_THRES_COEF=40

# 2. CADÊNCIA DE VARREDURA (Proteção do Barramento)
# Pausa de 500 milissegundos entre as varreduras (Apenas 2 ciclos por segundo).
# Fundamental para não causar I/O Wait nas VMs de 64GB e não roubar CPU do MikroTik.
KSM_SLEEP_MSEC=500

# 3. VOLUME DE PROCESSAMENTO (O Teto de Operação)
# Limite máximo de 1250 páginas por varredura (~5 MB por ciclo).
# Reduz o impacto no barramento físico para no máximo 10 MB/s.
KSM_NPAGES_MAX=1250

# Aceleração contida. Impede picos de processamento abruptos quando 
# o gatilho de 60% de uso de RAM é cruzado.
KSM_NPAGES_BOOST=300

# 4. MONITORAMENTO E DECAIMENTO (Padrões Mantidos)
# Frequência que o daemon avalia se o host atingiu o limite de memória.
KSM_MONITOR_INTERVAL=25
# KSM_NPAGES_DECAY=-50
# KSM_NPAGES_MIN=64

# KSM_THRES_CONST=2048
LOGFILE=/var/log/ksmtuned
# DEBUG=1
